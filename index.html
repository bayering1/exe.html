<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hacker Paneli</title>

<style>
body {
    margin: 0;
    background: black;
    color: lime;
    font-family: monospace;
    overflow: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.container {
    position: relative;
    text-align: center;
    padding-top: 100px;
    z-index: 1;
}

button {
    padding: 10px 20px;
    background: lime;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* FAKE POPUP STYLE */
.popup {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: black;
    color: red;
    border: 3px solid red;
    padding: 20px;
    font-family: monospace;
    font-size: 20px;
    display: none;
    z-index: 2;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>⚠️ HACKER PANELİ ⚠️</h1>
    <button onclick="baslat()">Sisteme Gir</button>
    <div id="yazi"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">KRITIK SISTEM ARIZASI!</div>

<script>
// MATRIX EFEKTİ
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let harfler = "01".split("");
let fontSize = 14;
let kolon = canvas.width / fontSize;
let drops = [];

for (let i = 0; i < kolon; i++) drops[i] = 1;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "lime";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = harfler[Math.floor(Math.random() * harfler.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.95) drops[i]=0;
        drops[i]++;
    }
}

let animasyon;

// YAZI EFEKTİ
function yaz(metin, sure){
    return new Promise(resolve=>{
        setTimeout(()=>{
            document.getElementById("yazi").innerText += metin + "\n";
            resolve();
        }, sure);
    });
}

// BIP SES
function bip(){
    let ctx2 = new (window.AudioContext || window.webkitAudioContext)();
    let o = ctx2.createOscillator();
    let g = ctx2.createGain();
    o.connect(g);
    g.connect(ctx2.destination);
    o.frequency.value = 600;
    o.type = "square";
    o.start();
    g.gain.exponentialRampToValueAtTime(0.00001, ctx2.currentTime + 0.2);
}

// EKRAN TİTREME
function titret(){
    let body = document.body;
    let i=0;
    let interval = setInterval(()=>{
        body.style.transform = (i%2==0) ? "translate(5px,5px)" : "translate(-5px,-5px)";
        i++;
        if(i>10){ clearInterval(interval); body.style.transform=""; }
    },50);
}

// ANA SİSTEM
async function baslat(){
    document.getElementById("yazi").innerText="";
    animasyon = setInterval(draw,33);

    await yaz("Sisteme bağlanılıyor...",1000); bip();
    await yaz("Dosyalar indiriliyor...",1500); bip();
    await yaz("Şifre kırılıyor...",1500); bip();
    await yaz("Kamera erişimi sağlandı!",1500); bip();
    await yaz("Tüm bilgiler alındı...",1500); bip();

    clearInterval(animasyon);

    // FAKE HATA POPUP
    let popup = document.getElementById("popup");
    popup.style.display="block";
    titret();
    bip();

    // GERİ SAYIM
    for(let i=3;i>0;i--){
        await yaz("Sistem kapanıyor... " + i,1000);
        bip();
    }

    await yaz(" ",500);
    // Şaka kısmını sen yazabilirsin 😎
}
</script>

</body>
</html>
